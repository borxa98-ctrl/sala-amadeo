<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas - Chef Amadeo</title>
    <style>
        :root {
            --c-principal: #1A2B3C;
            --c-fondo: #FDF6E3;
        }
        body {
            font-family: 'Georgia', serif;
            background-color: var(--c-fondo);
            padding: 20px;
            display: flex;
            justify-content: center;
            margin: 0;
            min-height: 100vh;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            border: 1px solid #D1C4AC;
        }
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-container img {
            max-width: 150px;
        }
        .grupo {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--c-principal);
            font-size: 0.9em;
            text-transform: uppercase;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #D1C4AC;
            border-radius: 0;
            box-sizing: border-box;
            background: #fafafa;
            font-family: 'Georgia', serif;
        }
        button {
            background: var(--c-principal);
            color: #FDF6E3;
            border: none;
            padding: 15px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Georgia', serif;
        }
        #mensajeGrupo {
            display: none;
            background: #1A2B3C;
            color: #FDF6E3;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
        }
        .btn-llamar {
            background: #D1C4AC;
            color: #1A2B3C;
            display: block;
            padding: 12px;
            margin-top: 15px;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
        }
        .btn-llamar:hover {
            background: #c1b396;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo-container">
            <img src="https://chefamadeo.com/wp-content/uploads/2025/11/logo-amadeo-transp-v.png" alt="Chef Amadeo">
        </div>
        <form id="formReserva">
            <div class="grupo">
                <label>Nombre</label>
                <input type="text" name="nombre" required>
            </div>
            <div class="grupo">
                <label>Teléfono</label>
                <input type="tel" name="telefono" required>
            </div>
            <div class="grupo">
                <label>Fecha</label>
                <input type="date" id="fecha" name="fecha" required onchange="actualizarHoras()">
            </div>
            <div class="grupo">
                <label>Hora</label>
                <select id="hora" name="hora" required>
                    <option value="">Selecciona fecha primero...</option>
                </select>
            </div>
            <div class="grupo">
                <label>Comensales</label>
                <input type="number" id="comensales" name="comensales" min="1" required oninput="checkGrupo()">
            </div>
            <div id="camposReserva">
                <div class="grupo">
                    <label>Sala</label>
                    <select name="sala" required>
                        <option value="">Selecciona...</option>
                        <option value="Interior">Interior</option>
                        <option value="Terraza">Terraza</option>
                    </select>
                </div>
                <div class="grupo">
                    <label>Especialidad de Arroz</label>
                    <select name="arroz">
                        <option value="Senyoret">Arroz del Senyoret</option>
                        <option value="Banda">Arroz a Banda</option>
                        <option value="Negro">Arroz Negro</option>
                        <option value="Valenciana">Paella Valenciana</option>
                        <option value="Fideua">Fideuà de Gandia</option>
                        <option value="Bogavante">Arroz de Bogavante</option>
                    </select>
                </div>
                <div class="grupo">
                    <label>Alergias</label>
                    <textarea name="alergias"></textarea>
                </div>
                <button type="submit">Reservar Mesa</button>
            </div>
            <div id="mensajeGrupo">
                Para grupos de más de 13 personas, por favor llámanos.
                <a href="tel:+34962846931" class="btn-llamar">📞 LLAMAR AL 962 84 69 31</a>
            </div>
        </form>
    </div>

    <script>
        // ⚠️ REEMPLAZA ESTA URL CON LA DE TU WEB APP DE GOOGLE APPS SCRIPT
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbz9PQYlsVfJqZaCMCZSOSm9Zu_KosWENH5ZOI40S-H1hmluWXTs1xaMf8t80fQ12Dd4Rg/exec"; // Ejemplo: "https://script.google.com/macros/s/XXXXXX/exec"

        /**
         * Verifica si el número de comensales es mayor a 13 y muestra/oculta el formulario.
         */
        function checkGrupo() {
            const comensales = document.getElementById('comensales').value;
            const camposReserva = document.getElementById('camposReserva');
            const mensajeGrupo = document.getElementById('mensajeGrupo');

            if (comensales > 13) {
                camposReserva.style.display = 'none';
                mensajeGrupo.style.display = 'block';
            } else {
                camposReserva.style.display = 'block';
                mensajeGrupo.style.display = 'none';
            }
        }

        /**
         * Actualiza las opciones del selector de hora según el día de la semana.
         */
        function actualizarHoras() {
            const fechaInput = document.getElementById('fecha').value;
            if (!fechaInput) return;

            const fecha = new Date(fechaInput + 'T00:00:00');
            const diaSemana = fecha.getDay(); // 0=domingo, 1=lunes, etc.

            const selectHora = document.getElementById('hora');
            selectHora.innerHTML = '<option value="">Selecciona una hora...</option>';

            if (diaSemana === 1) {
                // Lunes cerrado
                selectHora.innerHTML = '<option value="">Lunes cerrado</option>';
                return;
            }

            // Horarios de almuerzo (todos los días excepto lunes)
            ["13:00", "13:30", "14:00", "14:30", "15:00"].forEach(hora => {
                selectHora.add(new Option(hora, hora));
            });

            // Horarios de cena (jueves a sábado)
            if (diaSemana >= 4 && diaSemana <= 6) {
                ["20:00", "20:30", "21:00", "21:30"].forEach(hora => {
                    selectHora.add(new Option(hora, hora));
                });
            }
        }

        /**
         * Envía los datos del formulario al backend cuando se hace clic en "Reservar".
         */
        document.getElementById('formReserva').onsubmit = function(e) {
            e.preventDefault();
            const formData = new FormData(this);

            fetch(URL_SCRIPT, {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (response.ok) {
                    alert("✅ Reserva solicitada con éxito. ¡Gracias!");
                    document.getElementById('formReserva').reset();
                    document.getElementById('hora').innerHTML = '<option value="">Selecciona fecha primero...</option>';
                } else {
                    throw new Error('Error en la reserva');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert("❌ Hubo un error al procesar tu reserva. Por favor, inténtalo más tarde o llámanos al 962 84 69 31.");
            });
        };
    </script>
</body>
</html>
