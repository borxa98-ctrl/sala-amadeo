<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas - Chef Amadeo</title>
    
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #fcfbfa; 
            color: #1e252b; 
            margin: 0; 
            padding: 0; 
        }
        .main-container {
            max-width: 550px;
            margin: 0 auto;
            background: #ffffff;
            min-height: 100vh;
            padding: 40px 25px;
            box-sizing: border-box;
        }
        .header-brand {
            text-align: center;
            margin-bottom: 35px;
        }
        .header-brand h1 {
            font-family: serif; 
            font-size: 28px;
            letter-spacing: 2px;
            margin: 0 0 5px 0;
            color: #1e252b;
        }
        .header-brand p {
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #718096;
            margin: 0;
        }
        .form-group { 
            margin-bottom: 20px; 
        }
        .form-group label { 
            font-weight: bold; 
            display: block; 
            margin-bottom: 8px; 
            font-size: 12px;
            letter-spacing: 0.5px;
            color: #2d3748;
        }
        .form-control { 
            width: 100%; 
            padding: 12px 14px; 
            box-sizing: border-box; 
            border-radius: 8px; 
            border: 1px solid #e2e8f0; 
            font-size: 15px; 
            background-color: #f7fafc; 
            color: #1e252b;
        }
        .form-control:focus {
            outline: none;
            border-color: #cbd5e0;
            background-color: #fff;
        }
        .btn-submit { 
            width: 100%; 
            padding: 15px; 
            background: #111417; 
            border: none; 
            color: white; 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 50px; 
            font-size: 14px; 
            cursor: pointer; 
            margin-top: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: background 0.2s ease;
        }
        .btn-submit:hover { 
            background: #2d3748; 
        }
        .btn-submit:disabled {
            background: #a0aec0;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-brand">
            <h1>CHEF AMADEO</h1>
            <p>ECOSISTEMA DIGITAL · PLAYA DE GANDIA</p>
        </div>

        <form id="reservationForm">
            <div class="form-group">
                <label for="nombre">NOMBRE Y APELLIDOS</label>
                <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Introduce tu nombre completo" required>
            </div>
            
            <div class="form-group">
                <label for="telefono">TELÉFONO DE CONTACTO</label>
                <input type="tel" id="telefono" name="telefono" class="form-control" placeholder="Ej. +34 642570810" required>
            </div>
            
            <div class="form-group">
                <label for="fecha">FECHA DE LA RESERVA</label>
                <input type="date" id="fecha" name="fecha" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label for="hora">HORA DE LLEGADA</label>
                <select id="hora" name="hora" class="form-control" required>
                    <option value="" disabled selected hidden>Selecciona una hora...</option>
                    <option value="13:30">13:30</option>
                    <option value="14:00">14:00</option>
                    <option value="14:30">14:30</option>
                    <option value="15:00">15:00</option>
                    <option value="20:30">20:30</option>
                    <option value="21:00">21:00</option>
                    <option value="21:30">21:30</option>
                    <option value="22:00">22:00</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="comensales">NÚMERO DE COMENSALES</label>
                <select id="comensales" name="comensales" class="form-control" required>
                    <option value="" disabled selected hidden>Selecciona cuántos sois...</option>
                    <option value="1">1 persona</option>
                    <option value="2">2 personas</option>
                    <option value="3">3 personas</option>
                    <option value="4">4 personas</option>
                    <option value="5">5 personas</option>
                    <option value="6">6 personas</option>
                    <option value="7">7 personas</option>
                    <option value="8">8 personas</option>
                    <option value="Más de 8">Más de 8 personas</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="arroz">ESPECIALIDAD DE ARROZ / FIDEUÀ A ENCARGAR</label>
                <select id="arroz" name="arroz" class="form-control">
                    <option value="Ninguno" selected>No deseo encargar arroz ahora</option>
                    <optgroup label="Paellas de Carne">
                        <option value="Paella Valenciana">Paella Valenciana</option>
                        <option value="Paella de Habas y Alcachofas">Paella de Habas y Alcachofas</option>
                        <option value="Paella de Pato y Foie">Paella de Pato y Foie</option>
                        <option value="Paella de Puchero">Paella de Puchero</option>
                    </optgroup>
                    <optgroup label="Paellas Marineras">
                        <option value="Arroz a Banda">Arroz a Banda</option>
                        <option value="Arroz del Senyoret">Arroz del Senyoret</option>
                        <option value="Paella Negra">Paella Negra</option>
                        <option value="Paella de Marisco">Paella de Marisco</option>
                    </optgroup>
                </select>
            </div>

            <button type="submit" id="btnSubmit" class="btn-submit">Confirmar Reserva</button>
        </form>
    </div>

    <script>
        // 📢 IMPORTANTE: REEMPLAZA ESTA URL POR LA DE TU WEB APP AL IMPLEMENTAR EN GOOGLE
        const URL_WEB_APP = https://script.google.com/macros/s/AKfycbzOmG3Avr4GFD0HAK_1Z5TJLHgr2rA9xN8hl4-oa1f3W9_rxZi6OQ6YcPDStoDJJ6GX/exec; 

        document.getElementById('reservationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            var btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = "PROCESANDO...";

            var datosFormulario = {
                nombre: document.getElementById('nombre').value,
                telefono: document.getElementById('telefono').value,
                fecha: document.getElementById('fecha').value,
                hora: document.getElementById('hora').value,
                comensales: document.getElementById('comensales').value,
                arroz: document.getElementById('arroz').value,
                alergias: "Ninguna",
                espera: "Pendiente"
            };

            var formData = [];
            for (var key in datosFormulario) {
                formData.push(encodeURIComponent(key) + "=" + encodeURIComponent(datosFormulario[key]));
            }
            var bodyData = formData.join("&");

            fetch(URL_WEB_APP, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: bodyData
            })
            .then(function(response) { return response.json(); })
            .then(function(resultado) {
                if (resultado.exito) {
                    alert("¡Reserva solicitada con éxito en Chef Amadeo!");
                    document.getElementById('reservationForm').reset();
                } else {
                    alert("Hubo un problema: " + resultado.mensaje);
                }
            })
            .catch(function(error) {
                console.error("Error en la petición:", error);
                alert("Reserva enviada directamente al libro. Verifique con el restaurante para reconfirmar su mesa.");
            })
            .finally(function() {
                btn.disabled = false;
                btn.innerText = "Confirmar Reserva";
            });
        });
    </script>
</body>
</html>
