<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Mesa - Chef Amadeo</title>
    <style>
        :root { --c-primario: #1A2B3C; --c-fondo: #f8fafc; }
        body { font-family: sans-serif; background: var(--c-fondo); padding: 20px; display: flex; justify-content: center; }
        .box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .grupo { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background: var(--c-primario); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>RESERVAS</h2>
        <form id="formReserva">
            <div class="grupo"><label>Nombre</label><input type="text" id="nombre" required></div>
            <div class="grupo"><label>Teléfono</label><input type="tel" id="telefono" required></div>
            <div class="grupo"><label>Fecha</label><input type="date" id="fecha" required onchange="actualizarHoras()"></div>
            <div class="grupo"><label>Hora</label><select id="hora" required><option value="">Selecciona fecha primero...</option></select></div>
            <div class="grupo"><label>Comensales</label><input type="number" id="comensales" min="1" required></div>
            <div class="grupo"><label>Arroz</label><select id="arroz"><option value="Ninguno">Ninguno</option><option value="Senyoret">Senyoret</option><option value="Banda">Banda</option><option value="Negro">Negro</option></select></div>
            <div class="grupo"><label>Alergias</label><textarea id="alergias"></textarea></div>
            <button type="submit">Solicitar Reserva</button>
        </form>
    </div>
    <script>
        function actualizarHoras() {
            const fecha = new Date(document.getElementById('fecha').value + 'T00:00:00');
            const dia = fecha.getDay();
            const select = document.getElementById('hora');
            select.innerHTML = '';
            if (dia === 1) { select.innerHTML = '<option value="">Lunes cerrado</option>'; return; }
            ["13:00","13:30","14:00","14:30","15:00","15:30"].forEach(h => select.add(new Option(h, h)));
            if (dia >= 4 && dia <= 6) { ["20:00","20:30","21:00","21:30","22:00"].forEach(h => select.add(new Option(h, h))); }
        }
        document.getElementById('formReserva').onsubmit = function(e) {
            e.preventDefault();
            const data = new URLSearchParams(new FormData(e.target));
            fetch("https://script.google.com/macros/s/AKfycbz9PQYlsVfJqZaCMCZSOSm9Zu_KosWENH5ZOI40S-H1hmluWXTs1xaMf8t80fQ12Dd4Rg/exec", {method: 'POST', body: data}).then(() => alert("Reserva enviada"));
        }
    </script>
</body>
</html>
